# Перевод отображаемых данных постоянных улучшений.
# Механические значения, цены, материалы и CustomModelData находятся в config.yml.
# Названия предметов сопоставляются с их порядком в списке items соответствующего уровня.
upgrade-definitions:
  stable_speed:
    display-name: "&bТренировка скорости"
    description:
      - "&0Профессиональные тренировки навсегда увеличивают скорость движения."
      - "&8Бонус не изменяет генетику и не наследуется жеребятами."
    levels:
      1:
        effect-description: "&0+5% к скорости движения"
        item-names:
          - "&fСахар"
      2:
        effect-description: "&0+10% к скорости движения"
        item-names:
          - "&fСахар"
      3:
        effect-description: "&0+15% к скорости движения"
        item-names:
          - "&fСахар"

  vitality:
    display-name: "&cЗакалка"
    description:
      - "&0Улучшает физическую форму лошади и её максимальное здоровье."
      - "&8Текущее здоровье после каждого изменения ограничивается новым максимумом."
    levels:
      1:
        effect-description: "&0+2 к максимальному здоровью"
        item-names:
          - "&cЯблоко"
      2:
        effect-description: "&0+4 к максимальному здоровью"
        item-names:
          - "&6Золотая морковь"
      3:
        effect-description: "&0+6 к максимальному здоровью"
        item-names:
          - "&6Золотое яблоко"

  jump_training:
    display-name: "&aТренировка прыжка"
    description:
      - "&0Усиливает технику прыжка, не изменяя наследуемые характеристики."
      - "&8Высокие уровни позволяют преодолевать более высокие препятствия."
    levels:
      1:
        effect-description: "&0+5% к силе прыжка"
        item-names:
          - "&aСгусток слизи"
      2:
        effect-description: "&0+10% к силе прыжка"
        item-names:
          - "&eКроличья лапка"
      3:
        effect-description: "&0+15% к силе прыжка"
        item-names:
          - "&eКроличья лапка"

  sure_footed:
    display-name: "&eУверенный шаг"
    description:
      - "&0Уменьшает урон от падения для лошади и её всадников."
      - "&8Максимальный уровень полностью защищает от падений."
    levels:
      1:
        effect-description: "&0Уменьшает урон от падения на 25%"
        item-names:
          - "&fПеро"
      2:
        effect-description: "&0Уменьшает урон от падения на 50%"
        item-names:
          - "&fПеро"
      3:
        effect-description: "&0Полностью предотвращает урон от падения"
        item-names:
          - "&dМембрана фантома"

  tandem_seat:
    display-name: "&6Парная езда"
    description:
      - "&0Добавляет второе место позади основного всадника."
      - "&8Другой игрок может нажать ПКМ по занятой лошади и сесть пассажиром."
    levels:
      1:
        effect-description: "&0Открывает место для второго пассажира"
        item-names:
          - "&6Седло"
          - "&6Комплект второго сиденья"

  horn_mastery:
    display-name: "&dМастерство горна"
    description:
      - "&0Усиливает связь между лошадью и её призывным горном."
      - "&8Каждый уровень уменьшает перезарядку призыва этой лошади."
    levels:
      1:
        effect-description: "&0Уменьшает перезарядку горна на 10%"
        item-names:
          - "&6Медный слиток"
      2:
        effect-description: "&0Уменьшает перезарядку горна на 20%"
        item-names:
          - "&6Медный слиток"
      3:
        effect-description: "&0Уменьшает перезарядку горна на 30%"
        item-names:
          - "&eКозий рог"

  loyal_mount:
    display-name: "&9Верная лошадь"
    description:
      - "&0Лошадь принимает в качестве всадника только своего владельца."
      - "&8Игроки с административным разрешением обхода не ограничиваются."
    levels:
      1:
        effect-description: "&0Только владелец может ездить на этой лошади"
        item-names:
          - "&fБирка"
          - "&fЖелезный слиток"

