# BetterHorses config

# Configure custom aliases for the /horse command
command-aliases:
  # - bh
  # - horses

# Extensive debugging for command flow and horse item metadata inspection
debug:
  # When enabled, detailed BetterHorses debug logs are written to console
  # and the /horse info command becomes available.
  enabled: false

# Customizes how big the maximum positive or negative mutation effect is (e.g. 0.05 = ±0.05)
# e.g. health-factor 3 means the health of the child can be up to 3 HP higher or lower than the average HP of both parents
mutation-factor:
  health: 3.0
  speed: 0.05
  jump: 0.05
  skeleton-horses:
    health: 3.0
    speed: 0.05
    jump: 0.05
  zombie-horses:
    health: 3.0
    speed: 0.05
    jump: 0.05
  camels:
    health: 3.0
    speed: 0.05
    jump: 0.05

# Max stats a horse can reach
max-stats:
  health: 300.0
  speed: 0.4
  jump: 1.2
  skeleton-horses:
    health: 300.0
    speed: 0.4
    jump: 1.2
  zombie-horses:
    health: 300.0
    speed: 0.4
    jump: 1.2
  camels:
    health: 300.0
    speed: 0.4
    jump: 1.2

# Settings that determine horse growth
horse-growth-settings:

  # If false, horses will remain their Vanilla size, this feature only works for Paper 1.20.6 & Java 21 or above
  enabled: true
  mount-types:
    skeleton-horses: true
    zombie-horses: true
    camels: false

  # The time in minutes that needs to pass until a horse is fully grown
  time-until-adult: 3

  # The maximum size a horse can reach, this is the scale applied to a vanilla sized horse
  # If the value remains 1, an adult horse will be vanilla sized
  max-size: 1.3 # 30% bigger than vanilla

# General settings
settings:

  # Customizes the original item a horse item is
  horse-item: SADDLE

  # Controls which lore parts are shown for horse items and in what order.
  # Use nested sections to ensure child lines are only loaded when the parent section resolves to a visible line.
  # Available values: gender, health, speed, jump, growth, training, riding, brushing, feeding, trait, neutered, blank
  # You can also add literal custom lines with: literal:&7Your custom text
  horse-item-lore-layout:
    - stats:
        - gender
        - health
        - speed
        - jump
        - growth
        - blank
    - training:
        - riding
        - brushing
        - feeding
        - blank
    - trait
    - neutered

  # Allow additional mount types to be treated like BetterHorses horses
  mount-types:
    skeleton-horses: true
    zombie-horses: true
    camels: false

  # Allows two horses of the same gender to breed
  allow-same-gender-breeding: false

  # Restricts mounting a tamed horse to its respective owner
  restrict-mounting-to-owner: false

  # Makes every skeleton horse mountable like a vanilla horse, including skeleton horses spawned from spawn eggs
  mountable-skeleton-horses: true

  # Allows spawning the horse by rightclicking with the horse item
  allow-rightclick-spawn: true

  # If enabled, players riding a horse cant be hit
  rider-invulnerable: false

  # Fixes a vanilla bug where horses cant automatically climb from a path block onto a full block
  # because it exceeds their 1-block step height, only applies to mounted horses
  fix-step-height: true

  # Increases player melee damage by the given percentage while riding a horse
  mounted-damage-boost:
    enabled: false
    percentage: 25.0 # 25% more damage while mounted

  # Applies Slowness II to mounted horses while they walk on sand blocks.
  # This affects all supported mount types except camels.
  sand-slowness:
    enabled: false

  # Traited horses will have particles around them, disabling this will result in slightly better performance
  trait-particle-indicator: true

  # The amount of time in seconds that a horse needs before it can breed again (set to 0 for no cooldown)
  breeding-cooldown: 300 # 5 minutes

  # If true, male horses will ignore the breeding cooldown
  male-ignore-cooldown: true

  cooldown-display:
    # If false, the trait cooldown isn't displayed at all
    enabled: true

    # If true, the trait cooldown is shown as a bossbar when using an ability that is currently on cooldown
    show-bossbar-indicator: false

    # If true, the trait cooldown is shown above the hotbar when using an ability that is currently on cooldown
    show-hotbar-indicator: true

# Horse Abilities
traits:
  # Set this to false to disable the whole trait feature
  enabled: true

  hellmare:
    enabled: true
    chance: 0.005 # 0.5%
    particle: FLAME
    duration: 5
    cooldown: 90
    radius: 2 # Radius of the fire below the horse

  fireheart:
    enabled: true
    chance: 0.01 # 1%
    particle: LAVA

  dashboost:
    enabled: true
    chance: 0.01 # 1%
    particle: SWEEP_ATTACK
    duration: 10
    cooldown: 30

  featherhooves:
    enabled: true
    chance: 0.01 # 1%
    particle: CLOUD

  frosthooves:
    enabled: true
    chance: 0.005 # 0.5%
    particle: SNOWFLAKE
    radius: 3 # Radius of the ice below the horse

  kickback:
    enabled: true
    chance: 0.005 # 0.5%
    particle: CRIT
    radius: 4
    strength: 6
    cooldown: 20

  ghosthorse:
    enabled: true
    chance: 0.005 # 0.5%
    particle: SMOKE
    duration: 5
    cooldown: 30

  skyburst:
    enabled: true
    chance: 0.003 # 0.3%
    particle: CLOUD
    radius: 4

  revenantcurse:
    enabled: true
    chance: 0.005 # 0.5%
    particle: SOUL
    cooldown: 30
    duration: 10

  heavenhooves:
    enabled: true
    chance: 0.001 # 0.1%
    particle: GLOW
    strength: 0.4
    particles: true # Refers to particles that appear when jumping

# Horse training system
training:
  # Master toggle for all training categories
  enabled: true

  lore:
    # Controls whether training information should be displayed on horse-item lore.
    enabled: true

    progress-bar:
      length: 15
      # If true, hides the progressbar when at 100% and replaces it with "Complete"
      hide-on-complete: true
      # If true, if all categories are completed, they are combined and displayed as "Training Complete"
      combine-all-complete: true

  categories:
    riding:
      enabled: true
      # 1% progress = this many blocks ridden
      units-per-percent: 100.0
      # 0.2 means +0.2% speed per 1% progress
      bonus-percent-per-progress-percent: 0.2

    brushing:
      enabled: true
      item: BRUSH
      cooldown-seconds: 180
      units-per-use: 2.0
      # 1% progress = this many brush uses (units)
      units-per-percent: 1.0
      # 0.2 means +0.2% jump strength per 1% progress
      bonus-percent-per-progress-percent: 0.2

    feeding:
      enabled: true
      cooldown-seconds: 180
      # 1% progress = this much total food value
      units-per-percent: 2.0
      # 0.2 means +0.2% max HP per 1% progress
      bonus-percent-per-progress-percent: 0.2
      food-values:
        WHEAT: 1.0
        APPLE: 1.0
        CARROT: 1.0
        SUGAR: 1.0
        HAY_BLOCK: 2.0
        GOLDEN_CARROT: 3.0
        GOLDEN_APPLE: 5.0
        ENCHANTED_GOLDEN_APPLE: 8.0

# Goat horn summon system inspired by Call Your Horse.
# Bind: sneak + right-click your mount with the configured horn.
# Call: right-click with the bound horn.
horse-summon:
  enabled: true
  require-owner: true
  prevent-call-with-player-passenger: true
  auto-mount: false

  # Default summon cooldown for all players, in seconds.
  # Can be overridden with permissions like betterhorses.summoncooldown.60
  # If a player has multiple cooldown permissions, the lowest value is used.
  cooldown-seconds: 300

  # Default amount of successful/failed-not-found summon attempts per newly bound horn.
  # Can be overridden with permissions like betterhorses.summonuses.10
  # If a player has multiple uses permissions, the highest value is used.
  default-uses: 5

  notifications:
    # Where summon-horn feedback should be shown.
    # Available values: CHAT, ACTION_BAR, BOTH, NONE
    mode: ACTION_BAR
    # Prevents chat/actionbar spam while the player keeps holding right-click with the horn.
    # During this short vanilla item cooldown repeated uses are ignored silently.
    repeat-cooldown-ticks: 40

  # Worlds where calling a bound mount with the horn is disabled.
  # Binding a horn is still allowed; only the summon action is blocked.
  disabled-worlds:
    - world_nether
    - world_the_end

  bind-distance: 10.0
  summon-distance-behind: 3.0
  summon-side-search-radius: 3

  # If true, the plugin reads the bound horse location from SQLite and loads
  # exactly that saved chunk asynchronously when the horse is not currently loaded.
  load-unloaded-chunk: true

  # How far around the last known chunk the plugin may search if the horse is not
  # found in the exact saved chunk. 1 means a 3x3 chunk area and is usually enough
  # for cases where the horse crossed a chunk border before unloading.
  unloaded-search-radius-chunks: 1

  tracking:
    # Keeps SQLite coordinates up to date for loaded bound horses.
    # This fixes the case where a player summons a horse, rides far away, returns home
    # by command/portal, and then calls the horse again.
    enabled: true
    # The plugin does NOT write to SQLite every step. It refreshes loaded bound horses
    # only once per this interval, asynchronously.
    update-interval-seconds: 30

  horn:
    material: GOAT_HORN
    # -1 means any goat horn with no CustomModelData requirement.
    # Set a positive value if you want only a custom-model horn to work.
    custom-model-data: -1
