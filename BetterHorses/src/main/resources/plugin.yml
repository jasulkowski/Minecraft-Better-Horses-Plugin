name: BetterHorses
main: me.luisgamedev.betterhorses.BetterHorses
version: 6.1
api-version: 1.20
softdepend: [ ProtocolLib, PlaceholderAPI, Vault ]

libraries:
  - org.xerial:sqlite-jdbc:3.46.1.0
  - org.slf4j:slf4j-api:2.0.13

commands:
  horse:
    description: Manage horse actions like spawn and despawn
    usage: /<command> <spawn|despawn|neuter>
    permission: betterhorses.base

  horsecreate:
    description: Create a custom horse item
    usage: /horsecreate <health> <speed> <jump> [gender] [name] [trait] [growth] [mounttype]
    permission: betterhorses.create

permissions:
  betterhorses.base:
    description: Allows using the /horse spawn|despawn command
    default: true

  betterhorses.neuter:
    description: Allows obtaining and using veterinary shears
    default: true

  betterhorses.create:
    description: Allows using /horsecreate
    default: op

  betterhorses.reload:
    description: Allows reloading the BetterHorses configuration
    default: op

  betterhorses.bypass:
    description: Allows riding horses of other players


  betterhorses.summon:
    description: Allows binding and using goat horns to call mounts
    default: true

  betterhorses.summoncooldown.<seconds>:
    description: Dynamic permission pattern. Replace <seconds> with a number, for example betterhorses.summoncooldown.60
    default: false
